---
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [update-data]
  workflow_run:
    workflows: ["Fetch GitHub Data"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Deploying ${REPO}@${SHA} to gh-pages"

          rm -rf repo
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" repo
          cd repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage site contents (everything except git internals and workflow config).
          rm -rf _site
          mkdir _site
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_gh_pages" \
            ./ _site/

          # Prepare a separate checkout for the gh-pages branch.
          rm -rf _gh_pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages --single-branch \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" _gh_pages
          else
            mkdir _gh_pages
            cd _gh_pages
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
            cd ..
          fi

          # Keep the gh-pages repo metadata when syncing content.
          rsync -a --delete --exclude ".git" _site/ _gh_pages/
          cd _gh_pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Avoid Jekyll processing.
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "chore: deploy ${SHA}"
          if ! git push origin HEAD:gh-pages; then
            echo "Failed to push to gh-pages."
            echo "Check repo Settings → Actions → General → Workflow permissions is set to 'Read and write permissions'."
            exit 1
          fi

          echo "Pushed gh-pages successfully."
