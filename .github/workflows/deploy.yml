---
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [update-data]

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          rm -rf repo
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" repo
          cd repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage site contents (everything except git internals and workflow config).
          rm -rf _site
          mkdir _site
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            --exclude "_gh_pages" \
            ./ _site/

          # Prepare a separate checkout for the gh-pages branch.
          rm -rf _gh_pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages --single-branch \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" _gh_pages
          else
            mkdir _gh_pages
            cd _gh_pages
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
            cd ..
          fi

          rsync -a --delete _site/ _gh_pages/
          cd _gh_pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Avoid Jekyll processing.
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "chore: deploy ${SHA}"
          git push origin gh-pages
