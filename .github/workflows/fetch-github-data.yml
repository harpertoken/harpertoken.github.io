name: Fetch GitHub Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fetch-github-data.yml'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch repos
          REPOS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/orgs/harpertoken/repos?sort=pushed&per_page=20" | \
            jq '[.[] | {name: .name, html_url: .html_url, language: .language, stargazers_count: .stargazers_count, forks_count: .forks_count}]')

          # Fetch latest release
          RELEASE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/harpertoken/harper/releases/latest" | \
            jq '{tag_name: .tag_name, html_url: .html_url}')

          # Create JSON
          echo "{\"repos\": $REPOS, \"latest_release\": $RELEASE}" > assets/github-data.json

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/github-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update github data"
            git push
            # Trigger deploy workflow
            sleep 2
            gh api repos/harpertoken/harpertoken.github.io/actions/workflows/deploy.yml/dispatches -X POST -f ref='main'
          fi
