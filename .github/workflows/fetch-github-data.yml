name: Fetch GitHub Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fetch-github-data.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch repos
          REPOS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/orgs/harpertoken/repos?sort=pushed&per_page=20" | \
            jq '[.[] | {name: .name, html_url: .html_url, language: .language, stargazers_count: .stargazers_count, forks_count: .forks_count}]')

          # Fetch latest release
          RELEASE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/harpertoken/harper/releases/latest" | \
            jq '{tag_name: .tag_name, html_url: .html_url}')

          # Fetch open PRs (org-wide)
          OPEN_PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=org:harpertoken+is:pr+is:open&sort=updated&order=desc&per_page=10" | \
            jq '{total_count: .total_count, items: [.items[] | {repo: (.repository_url | split("/") | last), number: .number, title: .title, html_url: .html_url, updated_at: .updated_at, user: (.user.login // null), comments: .comments}]}')

          # Fetch open issues (org-wide)
          OPEN_ISSUES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=org:harpertoken+is:issue+is:open&sort=updated&order=desc&per_page=10" | \
            jq '{total_count: .total_count, items: [.items[] | {repo: (.repository_url | split("/") | last), number: .number, title: .title, html_url: .html_url, updated_at: .updated_at, user: (.user.login // null), comments: .comments}]}')

          # Create JSON
          echo "{\"repos\": $REPOS, \"latest_release\": $RELEASE, \"open_prs\": $OPEN_PRS, \"open_issues\": $OPEN_ISSUES}" > assets/github-data.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/github-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update github data"
            git push
            # Trigger deploy workflow using repository dispatch
            TOKEN="${{ secrets.DEPLOY_DISPATCH_TOKEN }}"
            if [ -z "$TOKEN" ]; then
              TOKEN="$GITHUB_TOKEN"
            fi
            curl -L -X POST https://api.github.com/repos/harpertoken/harpertoken.github.io/dispatches \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d '{"event_type":"update-data"}'
          fi
