<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - harper</title>
    <link rel="stylesheet" href="assets/styles.css?v=8">
    <script>document.documentElement.classList.add('js');</script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html"><img src="https://avatars.githubusercontent.com/u/203538727?s=400&v=4" alt="Harper"></a>
            <a href="index.html" style="text-decoration:none"><span>harper</span></a>
        </div>

        <div class="sidebar-section">
            <h3>Navigate</h3>
            <nav class="sidebar-nav">
                <a href="index.html">Home</a>
                <a href="welcome.html">Welcome</a>
                <a href="legal.html">Legal</a>
                <a href="cla.html">CLA</a>
            </nav>
        </div>

        <div class="sidebar-section">
            <h3>Team</h3>
            <div class="sidebar-team">
                <a href="https://github.com/bniladridas"><img src="https://avatars.githubusercontent.com/u/125604915?s=400&v=4" alt="Lead"></a>
                <a href="https://github.com/harper-dev-hq"><img src="https://avatars.githubusercontent.com/u/236089746?s=400&v=4" alt="Bug"></a>
                <a href="https://github.com/harper-rel-hq"><img src="https://avatars.githubusercontent.com/u/237646224?s=400&v=4" alt="Release"></a>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Links</h3>
            <nav class="sidebar-nav">
                <a href="https://github.com/harpertoken">GitHub</a>
                <a href="https://hub.docker.com/u/harpertoken">Docker</a>
                <a href="https://huggingface.co/harpertoken">HuggingFace</a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Welcome</h1>
            <p class="tagline">Introduce yourself to the community</p>
            <button id="theme-toggle" class="theme-button">Theme: Light</button>
        </header>

        <div class="content-grid">
            <div class="content-card" style="grid-column: span 2;">
                <h2>Open a Welcome Issue</h2>
                <p>Submit this form to open a welcome issue. The bot will post a message and start the conversation.</p>
            </div>

            <div class="content-card" style="grid-column: span 2;">
                <form id="welcome-form" data-endpoint="https://harpertoken-welcome-bot.harpertoken-welcome.workers.dev">
                    <label class="form-field">
                        GitHub username
                        <input type="text" name="github" autocomplete="username" required>
                    </label>
                    <label class="form-field">
                        Your name
                        <input type="text" name="name" autocomplete="name" required>
                    </label>
                    <label class="form-field">
                        What brings you here?
                        <textarea name="note" rows="3" placeholder="Short intro (optional)"></textarea>
                    </label>
                    <label class="form-field">
                        Website or profile (optional)
                        <input type="url" name="link" placeholder="https://">
                    </label>
                    <label class="form-field trap-field">
                        Company (leave blank)
                        <input type="text" name="company" autocomplete="off" tabindex="-1">
                    </label>
                    <button class="primary-button" type="submit">Open welcome issue</button>
                    <p id="form-status" class="status" role="status" aria-live="polite"></p>
                </form>
            </div>
        </div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="modal-text"></p>
            </div>
        </div>
    </main>

    <script src="assets/script.js?v=8"></script>
    <script src="assets/welcome.js"></script>
</body>
</html>
