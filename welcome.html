<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Harper</title>
    <link rel="stylesheet" href="assets/styles.css?v=2">
</head>
<body>
    <header id="main-header">
        <a href="index.html"><img src="https://avatars.githubusercontent.com/u/203538727?s=400&amp;u=03d5f82ddba3ed9bbd6b8ec6817bad7e532a44e8&amp;v=4" alt="Harper's avatar"></a>
        <h1>Welcome</h1>
        <button id="legal-btn">Legal</button>
    </header>

    <div class="app-grid">
        <div class="card">
            <h3>Introduce Yourself</h3>
            <p>Submit this form to open a welcome issue. The bot will post a message and start the conversation.</p>
        </div>
        <div class="card">
            <h3>Welcome Form</h3>
            <form id="welcome-form" data-endpoint="https://welcome.harpertoken.org/api/welcome">
                <label class="form-field">
                    GitHub username
                    <input type="text" name="github" autocomplete="username" required>
                </label>
                <label class="form-field">
                    Your name
                    <input type="text" name="name" autocomplete="name" required>
                </label>
                <label class="form-field">
                    What brings you here?
                    <textarea name="note" rows="4" placeholder="Short intro (optional)"></textarea>
                </label>
                <label class="form-field">
                    Website or profile (optional)
                    <input type="url" name="link" placeholder="https://">
                </label>
                <label class="form-field trap-field">
                    Company (leave blank)
                    <input type="text" name="company" autocomplete="off" tabindex="-1">
                </label>
                <button class="primary-button" type="submit">Open welcome issue</button>
                <p id="form-status" class="status" role="status" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <div id="legal-content" style="display: none;">
        <div class="legal-grid">
            <div class="legal-item">🔒 <a href="legal.html#privacy">Privacy</a></div>
            <div class="legal-item">⚖️ <a href="legal.html#terms">Terms</a></div>
            <div class="legal-item">🎨 <button id="modal-contrast-btn">Theme</button></div>
            <div class="legal-item">⚡ <button id="grid-toggle-btn">Grid</button></div>
            <div class="legal-item">👁️ <button id="headings-toggle-btn">Headings</button></div>
            <div class="legal-item">📜 <a href="cla.html">CLA</a></div>
            <div class="legal-item">🐱 <a href="https://github.com/harpertoken" class="kernel-link" data-modal-text="Harper's GitHub repositories.">GitHub</a></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="modal-text"></p>
        </div>
    </div>

    <script src="assets/script.js"></script>
    <script src="assets/welcome.js"></script>
</body>
</html>
